<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Pipeline Funnel</title>
  <link rel="stylesheet" href="../design-tokens.css">

  <style>
    /* ── Component: Sales Pipeline Funnel Chart ────────────────────── */
    .chart-card {
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }

    .chart-card .card-body {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .chart-card .chart-container {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    .chart-card .chart-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Skeleton / loading state ─────────────────────────────────── */
    .chart-card .skeleton-chart {
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        var(--color-bg-surface, #1a1d27) 25%,
        var(--color-bg-hover, #2a2f42) 50%,
        var(--color-bg-surface, #1a1d27) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: var(--radius-sm, 4px);
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── Responsive adjustments ───────────────────────────────────── */
    @media (max-width: 768px) {
      .chart-card {
        min-height: 340px;
      }
    }

    @media (max-width: 480px) {
      .chart-card {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="card chart-card" id="sales-funnel-card">
    <div class="card-header">
      <span class="card-title">Sales Pipeline Funnel</span>
    </div>
    <div class="card-body" style="height:360px;">
      <div class="chart-container" id="sales-funnel-chart">
        <canvas></canvas>
      </div>
      <div class="skeleton-chart" id="chart-skeleton" style="position:absolute;inset:0;z-index:1;"></div>
    </div>
  </div>

  <script src="../js/bi-utils.js"></script>
  <script src="../js/bi-charts.js"></script>

  <script>
    (function() {
      'use strict';

      const CHART_ID = 'sales-funnel-chart';
      const SKELETON_ID = 'chart-skeleton';

      /**
       * Render the funnel chart with the given data.
       * Removes the skeleton overlay, then calls BI.charts.funnel().
       */
      function renderChart(data) {
        // Hide skeleton
        var skeleton = document.getElementById(SKELETON_ID);
        if (skeleton) {
          skeleton.style.opacity = '0';
          skeleton.style.transition = 'opacity 0.3s ease';
          setTimeout(function() { skeleton.remove(); }, 350);
        }

        // Render using the chart engine
        BI.charts.funnel(CHART_ID, data, {
          animate: true,
        });
      }

      /**
       * Fetch sample data from the assets directory.
       * Falls back to generated data on failure.
       */
      function loadData() {
        fetch('../assets/sample-data.json')
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
          })
          .then(function(json) {
            var data = json.funnelStages;
            if (data && data.length > 0) {
              // Assign colors from palette
              data.forEach(function(d, i) {
                d.color = d.color || BI.colors.get(i);
              });
              renderChart(data);
            } else {
              generateAndRender();
            }
          })
          .catch(function() {
            generateAndRender();
          });
      }

      /**
       * Generate 6 funnel stages as fallback data.
       */
      function generateAndRender() {
        var data = [
          { label: 'Website Visitors', value: 145000, color: BI.colors.get(0) },
          { label: 'Sign Ups',         value: 28300,  color: BI.colors.get(1) },
          { label: 'MQLs',             value: 8400,   color: BI.colors.get(2) },
          { label: 'SQLs',             value: 3200,   color: BI.colors.get(3) },
          { label: 'Opportunities',    value: 1100,   color: BI.colors.get(4) },
          { label: 'Closed Won',       value: 420,    color: BI.colors.get(5) },
        ];
        renderChart(data);
      }

      // ── Boot ────────────────────────────────────────────────────
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadData);
      } else {
        loadData();
      }

      // ── Resize: chart engine handles ResizeObserver internally ──
    })();
  </script>

</body>
</html>
