<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Performance vs Target — Gauge Charts</title>

  <!-- ── Design System Tokens ────────────────────────────────────────── -->
  <link rel="stylesheet" href="../design-tokens.css">

  <style>
    /* ==================================================================
       Gauge Charts — Component Styles
       ================================================================== */

    /* ── Grid container ───────────────────────────────────────────── */
    .gauge-grid {
      display: flex;
      gap: var(--space-5);
      padding: var(--space-5);
      flex-wrap: wrap;
    }

    /* ── Individual gauge card ─────────────────────────────────────── */
    .gauge-card {
      flex: 1;
      min-width: 240px;
      max-width: 100%;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      transition:
        border-color var(--transition-fast),
        box-shadow var(--transition-fast);
      animation: fadeIn 0.5s ease forwards;
      position: relative;
      overflow: hidden;
    }

    .gauge-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: transparent;
      transition: background var(--transition-normal);
    }

    .gauge-card:hover {
      border-color: var(--color-border-light);
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .gauge-card:hover::before {
      background: var(--color-accent);
    }

    /* ── Header row ───────────────────────────────────────────────── */
    .gauge-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 20px;
    }

    .gauge-label {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gauge-current-value {
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      font-family: var(--font-mono);
      line-height: var(--leading-tight);
      letter-spacing: var(--tracking-tight);
      flex-shrink: 0;
      margin-left: var(--space-3);
    }

    /* ── Chart canvas area ────────────────────────────────────────── */
    .gauge-chart-wrap {
      width: 100%;
      height: 210px;
      position: relative;
      overflow: hidden;
    }

    .gauge-chart-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Footer meta row ──────────────────────────────────────────── */
    .gauge-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      flex-wrap: wrap;
      gap: var(--space-1);
    }

    .gauge-target-marker {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }

    .gauge-target-line {
      display: inline-block;
      width: 12px;
      height: 2px;
      background: var(--color-text-primary);
      border-radius: 1px;
    }

    .gauge-status {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
    }

    .gauge-status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .gauge-status--success .gauge-status-dot { background: var(--color-success); }
    .gauge-status--warning .gauge-status-dot { background: var(--color-warning); }
    .gauge-status--danger  .gauge-status-dot { background: var(--color-danger); }
    .gauge-status--success                   { color: var(--color-success); }
    .gauge-status--warning                   { color: var(--color-warning); }
    .gauge-status--danger                    { color: var(--color-danger); }

    /* ── Skeleton / loading state ─────────────────────────────────── */
    .gauge-skeleton {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        90deg,
        var(--color-bg-surface) 25%,
        var(--color-bg-hover) 50%,
        var(--color-bg-surface) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: var(--radius-sm);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── Responsive ───────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .gauge-card {
        min-width: 200px;
      }
    }

    @media (max-width: 768px) {
      .gauge-grid {
        padding: var(--space-4);
        gap: var(--space-4);
        flex-direction: column;
      }

      .gauge-card {
        min-width: 0;
        width: 100%;
      }

      .gauge-chart-wrap {
        height: 180px;
      }
    }

    @media (max-width: 480px) {
      .gauge-grid {
        padding: var(--space-3);
        gap: var(--space-3);
      }

      .gauge-card {
        padding: var(--space-4);
      }

      .gauge-chart-wrap {
        height: 160px;
      }

      .gauge-current-value {
        font-size: var(--text-lg);
      }
    }
  </style>
</head>
<body>

  <!-- ── Card Wrapper ───────────────────────────────────────────────── -->
  <div class="card" id="gauge-dashboard-card">
    <div class="card-header">
      <span class="card-title">Performance vs Target</span>
      <span class="card-subtitle">Current period attainment overview</span>
    </div>
    <div class="card-body">
      <div class="gauge-grid" id="gauge-grid">

        <!-- ── Gauge 1: Target Attainment (gauge) ─────────────────── -->
        <div class="gauge-card" id="card-attainment">
          <div class="gauge-header">
            <span class="gauge-label">Revenue Attainment</span>
            <span class="gauge-current-value" id="gauge-val-1">78%</span>
          </div>
          <div class="gauge-chart-wrap" id="gauge-chart-1">
            <canvas></canvas>
            <div class="gauge-skeleton" id="skeleton-1"></div>
          </div>
          <div class="gauge-meta">
            <span class="gauge-target-marker">
              <span class="gauge-target-line"></span>
              Target: 100%
            </span>
            <span class="gauge-status gauge-status--success">
              <span class="gauge-status-dot"></span>
              On track
            </span>
          </div>
        </div>

        <!-- ── Gauge 2: Performance vs Range (bullet) ─────────────── -->
        <div class="gauge-card" id="card-bullet">
          <div class="gauge-header">
            <span class="gauge-label">Quarterly Revenue</span>
            <span class="gauge-current-value" id="gauge-val-2">$2.85M</span>
          </div>
          <div class="gauge-chart-wrap" id="gauge-chart-2">
            <canvas></canvas>
            <div class="gauge-skeleton" id="skeleton-2"></div>
          </div>
          <div class="gauge-meta">
            <span class="gauge-target-marker">
              <span class="gauge-target-line"></span>
              Target: $3.0M
            </span>
            <span class="gauge-status gauge-status--warning">
              <span class="gauge-status-dot"></span>
              Approaching
            </span>
          </div>
        </div>

        <!-- ── Gauge 3: CSAT Score (gauge) ────────────────────────── -->
        <div class="gauge-card" id="card-csat">
          <div class="gauge-header">
            <span class="gauge-label">Customer Satisfaction</span>
            <span class="gauge-current-value" id="gauge-val-3">4.2</span>
          </div>
          <div class="gauge-chart-wrap" id="gauge-chart-3">
            <canvas></canvas>
            <div class="gauge-skeleton" id="skeleton-3"></div>
          </div>
          <div class="gauge-meta">
            <span class="gauge-target-marker">
              <span class="gauge-target-line"></span>
              Target: 4.5
            </span>
            <span class="gauge-status gauge-status--warning">
              <span class="gauge-status-dot"></span>
              Near target
            </span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Libraries ───────────────────────────────────────────────────── -->
  <script src="../js/bi-utils.js"></script>
  <script src="../js/bi-charts.js"></script>

  <script>
    /* ==================================================================
       BI Dashboard — Gauge Chart Component
       ================================================================== */

    (function() {
      'use strict';

      /* ── Inline default data ───────────────────────────────────── */
      var defaultData = {
        attainment: { value: 78, max: 100 },
        performance: { value: 2.85, target: 3.0, max: 3.9 },
        csat: { value: 4.2, max: 5.0 }
      };

      /* ── Render all three charts ───────────────────────────────── */
      function renderCharts(d) {
        // Hide skeletons with a fade-out transition
        ['skeleton-1', 'skeleton-2', 'skeleton-3'].forEach(function(id) {
          var el = document.getElementById(id);
          if (el) {
            el.style.opacity = '0';
            el.style.transition = 'opacity 0.3s ease';
            setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 350);
          }
        });

        // Update value displays
        var v1 = document.getElementById('gauge-val-1');
        if (v1) v1.textContent = d.attainment.value + '%';

        var v2 = document.getElementById('gauge-val-2');
        if (v2) v2.textContent = '$' + d.performance.value.toFixed(2) + 'M';

        var v3 = document.getElementById('gauge-val-3');
        if (v3) v3.textContent = d.csat.value.toFixed(1);

        // ── Chart 1: Gauge — Target Attainment (78/100) ──────────
        BI.charts.gauge('gauge-chart-1', d.attainment.value, {
          min: 0,
          max: d.attainment.max,
          format: 'integer',
          label: '% of ' + d.attainment.max,
          animate: true
        });

        // ── Chart 2: Bullet — Performance vs Target Range ────────
        BI.charts.bullet('gauge-chart-2', d.performance.value, {
          target: d.performance.target,
          max: d.performance.max,
          format: 'fixed',
          label: 'Revenue ($M)',
          targetLabel: true,
          bad: d.performance.max * 0.4,
          satisfactory: d.performance.max * 0.75
        });

        // ── Chart 3: Gauge — CSAT Score ──────────────────────────
        BI.charts.gauge('gauge-chart-3', d.csat.value, {
          min: 0,
          max: d.csat.max,
          format: 'fixed',
          label: 'out of ' + d.csat.max.toFixed(1),
          animate: true
        });
      }

      /* ── Load data from sample-data.json, fall back to defaults ── */
      function loadData() {
        fetch('../assets/sample-data.json')
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
          })
          .then(function(json) {
            var data = {
              attainment: { value: 78, max: 100 },
              performance: {
                value: json.revenue ? json.revenue.current / 1000000 : 2.85,
                target: json.revenue ? json.revenue.target / 1000000 : 3.0,
                max: json.revenue ? (json.revenue.target * 1.3) / 1000000 : 3.9
              },
              csat: {
                value: json.satisfaction ? json.satisfaction.current : 4.2,
                max: json.satisfaction ? json.satisfaction.target + 0.2 : 5.0
              }
            };
            renderCharts(data);
          })
          .catch(function() {
            renderCharts(defaultData);
          });
      }

      /* ── Boot ───────────────────────────────────────────────────── */
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadData);
      } else {
        loadData();
      }

      /* ── Resize: chart engine handles ResizeObserver internally ── */
    })();
  </script>

</body>
</html>
