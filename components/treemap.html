<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revenue by Product — Treemap</title>
  <link rel="stylesheet" href="../design-tokens.css">

  <style>
    /* ── Component: Revenue by Product Treemap ────────────────────────── */
    .chart-card {
      min-height: 380px;
      display: flex;
      flex-direction: column;
    }

    .chart-card .card-body {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    .chart-card .chart-container {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
    }

    .chart-card .chart-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ── Skeleton / loading state ─────────────────────────────────────── */
    .chart-card .skeleton-chart {
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        var(--color-bg-surface, #1a1d27) 25%,
        var(--color-bg-hover, #2a2f42) 50%,
        var(--color-bg-surface, #1a1d27) 75%
      );
      background-size: 200% 100%;
      animation: shimmer 1.5s ease infinite;
      border-radius: var(--radius-sm, 4px);
    }

    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    /* ── Responsive adjustments ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .chart-card {
        min-height: 340px;
      }
    }

    @media (max-width: 480px) {
      .chart-card {
        min-height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="card chart-card" id="revenue-treemap-card">
    <div class="card-header">
      <span class="card-title">Revenue by Product (Treemap)</span>
    </div>
    <div class="card-body" style="height:340px;">
      <div class="chart-container" id="revenue-treemap-chart">
        <canvas></canvas>
      </div>
      <div class="skeleton-chart" id="chart-skeleton" style="position:absolute;inset:0;z-index:1;"></div>
    </div>
  </div>

  <script src="../js/bi-utils.js"></script>
  <script src="../js/bi-charts.js"></script>

  <script>
    (function() {
      'use strict';

      const CHART_ID = 'revenue-treemap-chart';
      const SKELETON_ID = 'chart-skeleton';

      /**
       * Render the treemap with the given data.
       * Removes the skeleton overlay, then calls BI.charts.treemap().
       */
      function renderChart(data) {
        // Hide skeleton
        var skeleton = document.getElementById(SKELETON_ID);
        if (skeleton) {
          skeleton.style.opacity = '0';
          skeleton.style.transition = 'opacity 0.3s ease';
          setTimeout(function() { skeleton.remove(); }, 350);
        }

        // Render using the chart engine
        BI.charts.treemap(CHART_ID, data, {
          animate: true,
        });
      }

      /**
       * Fetch sample data from the assets directory.
       * Falls back to generated data on failure.
       */
      function loadData() {
        fetch('../assets/sample-data.json')
          .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            return resp.json();
          })
          .then(function(json) {
            var data = json.productMix;
            if (data && data.length > 0) {
              renderChart(data);
            } else {
              generateAndRender();
            }
          })
          .catch(function() {
            generateAndRender();
          });
      }

      /**
       * Generate 5 product categories as fallback data.
       */
      function generateAndRender() {
        var data = [
          { label: 'SaaS Subscriptions',    value: 42, color: BI.colors.get(0) },
          { label: 'Professional Services', value: 23, color: BI.colors.get(1) },
          { label: 'Hardware',              value: 18, color: BI.colors.get(2) },
          { label: 'Licensing',             value: 12, color: BI.colors.get(3) },
          { label: 'Other',                 value:  5, color: BI.colors.get(4) },
        ];
        renderChart(data);
      }

      // ── Boot ────────────────────────────────────────────────────────
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadData);
      } else {
        loadData();
      }

      // ── Resize: chart engine handles ResizeObserver internally ──────
    })();
  </script>

</body>
</html>
